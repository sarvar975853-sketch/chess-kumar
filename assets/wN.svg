<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 440" width="240" height="440">

  <defs>
    <linearGradient id="bodyGradwhite_knight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf6e3"/><stop offset="45%" stop-color="#f1e4c3"/><stop offset="100%" stop-color="#d9c393"/>
    </linearGradient>
    <linearGradient id="shadowGradwhite_knight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d6a8"/><stop offset="100%" stop-color="#c4a86a"/>
    </linearGradient>
    <linearGradient id="goldGradwhite_knight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6c667"/>
      <stop offset="50%" stop-color="#b8860b"/>
      <stop offset="100%" stop-color="#e6c667"/>
    </linearGradient>
    <radialGradient id="vignettewhite_knight" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <g>

  <!-- Base plinth -->
  <ellipse cx="120" cy="400" rx="88" ry="20" fill="url(#shadowGradwhite_knight)" stroke="#8a6d3b" stroke-width="3"/>
  <path d="M 46 400 Q 46 355 60 345 L 180 345 Q 194 355 194 400 Z"
        fill="url(#bodyGradwhite_knight)" stroke="#8a6d3b" stroke-width="3"/>
  <ellipse cx="120" cy="345" rx="60" ry="13" fill="url(#shadowGradwhite_knight)" stroke="#8a6d3b" stroke-width="2.5"/>

  <!-- Gold base ring -->
  <ellipse cx="120" cy="336" rx="52" ry="10" fill="none" stroke="url(#goldGradwhite_knight)" stroke-width="4"/>

  <!-- lower stem taper -->
  <path d="M 88 336 Q 84 300 103.0 330
           L 137.0 330
           Q 156 300 152 336 Z"
        fill="url(#bodyGradwhite_knight)" stroke="#8a6d3b" stroke-width="2.5"/>

  <!-- collar ring -->
  <ellipse cx="120" cy="330" rx="21.0" ry="7" fill="none" stroke="url(#goldGradwhite_knight)" stroke-width="3.5"/>

  <!-- main stem -->
  <path d="M 107.0 330 Q 105.0 260.0 107.0 190
           L 133.0 190
           Q 135.0 260.0 133.0 330 Z"
        fill="url(#bodyGradwhite_knight)" stroke="#8a6d3b" stroke-width="2.5"/>

  <!-- upper collar -->
  <ellipse cx="120" cy="190" rx="18.0" ry="6.5" fill="none" stroke="url(#goldGradwhite_knight)" stroke-width="3.5"/>


  <ellipse cx="120" cy="190" rx="34" ry="9" fill="url(#shadowGradwhite_knight)" stroke="#8a6d3b" stroke-width="2.5"/>
  <path d="M 92 190
           Q 80 150 88 118
           Q 70 108 66 88
           Q 62 64 82 46
           Q 96 34 116 34
           Q 108 24 116 16
           Q 132 18 140 32
           Q 168 40 178 66
           Q 186 86 176 104
           Q 190 112 188 128
           Q 184 150 176 156
           Q 168 150 160 156
           Q 152 148 150 130
           Q 140 128 128 122
           Q 112 116 104 118
           Q 100 140 148 190
           Z"
        fill="url(#bodyGradwhite_knight)" stroke="#8a6d3b" stroke-width="2.8"/>
  <!-- eye -->
  <circle cx="150" cy="66" r="5" fill="url(#goldGradwhite_knight)" stroke="#8a6d3b" stroke-width="1"/>
  <!-- mane ridges -->
  <path d="M 96 50 Q 90 60 94 70 M 90 66 Q 84 76 88 86 M 86 84 Q 80 92 84 102"
        fill="none" stroke="url(#goldGradwhite_knight)" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <!-- browband -->
  <path d="M 140 34 Q 150 40 152 50" fill="none" stroke="url(#goldGradwhite_knight)" stroke-width="2.5" opacity="0.8"/>

  </g>
  <rect x="0" y="0" width="240" height="440" fill="url(#vignettewhite_knight)"/>
</svg>
