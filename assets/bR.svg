<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 440" width="240" height="440">

  <defs>
    <linearGradient id="bodyGradblack_rook" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a3a2c"/><stop offset="45%" stop-color="#2c2118"/><stop offset="100%" stop-color="#150f0a"/>
    </linearGradient>
    <linearGradient id="shadowGradblack_rook" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#241a12"/><stop offset="100%" stop-color="#0a0705"/>
    </linearGradient>
    <linearGradient id="goldGradblack_rook" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d878"/>
      <stop offset="50%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#f0d878"/>
    </linearGradient>
    <radialGradient id="vignetteblack_rook" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <g>

  <!-- Base plinth -->
  <ellipse cx="120" cy="400" rx="88" ry="20" fill="url(#shadowGradblack_rook)" stroke="#0a0705" stroke-width="3"/>
  <path d="M 46 400 Q 46 355 60 345 L 180 345 Q 194 355 194 400 Z"
        fill="url(#bodyGradblack_rook)" stroke="#0a0705" stroke-width="3"/>
  <ellipse cx="120" cy="345" rx="60" ry="13" fill="url(#shadowGradblack_rook)" stroke="#0a0705" stroke-width="2.5"/>

  <!-- Gold base ring -->
  <ellipse cx="120" cy="336" rx="52" ry="10" fill="none" stroke="url(#goldGradblack_rook)" stroke-width="4"/>

  <!-- lower stem taper -->
  <path d="M 88 336 Q 84 300 103.0 330
           L 137.0 330
           Q 156 300 152 336 Z"
        fill="url(#bodyGradblack_rook)" stroke="#0a0705" stroke-width="2.5"/>

  <!-- collar ring -->
  <ellipse cx="120" cy="330" rx="21.0" ry="7" fill="none" stroke="url(#goldGradblack_rook)" stroke-width="3.5"/>

  <!-- main stem -->
  <path d="M 107.0 330 Q 105.0 260.0 107.0 190
           L 133.0 190
           Q 135.0 260.0 133.0 330 Z"
        fill="url(#bodyGradblack_rook)" stroke="#0a0705" stroke-width="2.5"/>

  <!-- upper collar -->
  <ellipse cx="120" cy="190" rx="18.0" ry="6.5" fill="none" stroke="url(#goldGradblack_rook)" stroke-width="3.5"/>


  <ellipse cx="120" cy="190" rx="34" ry="9" fill="url(#shadowGradblack_rook)" stroke="#0a0705" stroke-width="2.5"/>
  <path d="M 92 190 Q 82 150 88 112 L 152 112 Q 158 150 148 190 Z"
        fill="url(#bodyGradblack_rook)" stroke="#0a0705" stroke-width="2.5"/>
  <path d="M 70 112 Q 66 86 76 58 L 76 40 L 92 40 L 92 58 L 100 58 L 100 40 L 116 40 L 116 58 L 124 58 L 124 40 L 140 40 L 140 58 L 148 58 L 148 40 L 164 40 L 164 58 Q 174 86 170 112 Z" fill="url(#bodyGradblack_rook)" stroke="#0a0705" stroke-width="3" stroke-linejoin="round"/>
  <rect x="72" y="86" width="96" height="8" fill="none" stroke="url(#goldGradblack_rook)" stroke-width="2.5"/>
  <rect x="72" y="70" width="96" height="4" fill="url(#goldGradblack_rook)" opacity="0.75"/>
  <circle cx="120" cy="98" r="5" fill="url(#goldGradblack_rook)" stroke="#0a0705" stroke-width="1"/>

  </g>
  <rect x="0" y="0" width="240" height="440" fill="url(#vignetteblack_rook)"/>
</svg>
